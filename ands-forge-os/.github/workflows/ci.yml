name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src tests evals scripts

      - name: Tests (pytest)
        run: pytest -q

      - name: Eval regression gate
        run: python evals/run_eval.py --gate

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ands-forge-os:ci .
      - name: Smoke-test the offline demo in the image
        run: docker run --rm ands-forge-os:ci python scripts/demo_walkthrough.py
