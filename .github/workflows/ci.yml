name: ci

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; the image job opts into packages:write.
permissions:
  contents: read

jobs:
  agent-runtime:
    name: agent-runtime (lint + tests + eval gate)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: ai-secops-copilot/services/agent-runtime/pyproject.toml

      - name: Install agent-runtime (dev extra)
        working-directory: ai-secops-copilot/services/agent-runtime
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: ai-secops-copilot/services/agent-runtime
        run: ruff check .

      - name: Unit + integration tests (pytest)
        working-directory: ai-secops-copilot/services/agent-runtime
        run: pytest -q

      - name: Evaluation harness self-tests
        working-directory: ai-secops-copilot
        run: python -m pytest evals -q

      - name: Evaluation regression gate (runtime + RAG + judge + governance)
        working-directory: ai-secops-copilot
        run: python evals/run_eval.py --predictor runtime --all --gate --no-write

  gateway:
    name: gateway (lint + build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ai-secops-copilot/services/gateway/package-lock.json

      - name: Install (npm ci)
        working-directory: ai-secops-copilot/services/gateway
        run: npm ci

      - name: Lint (eslint)
        working-directory: ai-secops-copilot/services/gateway
        run: npm run lint

      - name: Build (nest build)
        working-directory: ai-secops-copilot/services/gateway
        run: npm run build

      - name: Tests (jest)
        working-directory: ai-secops-copilot/services/gateway
        run: npm test

  images:
    name: build container images${{ github.event_name == 'push' && ' + publish' || '' }}
    runs-on: ubuntu-latest
    needs: [agent-runtime, gateway]
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (+ push) agent-runtime image
        uses: docker/build-push-action@v6
        with:
          context: ai-secops-copilot
          file: ai-secops-copilot/services/agent-runtime/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/secops-agent-runtime:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/secops-agent-runtime:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build (+ push) gateway image
        uses: docker/build-push-action@v6
        with:
          context: ai-secops-copilot/services/gateway
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/secops-gateway:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/secops-gateway:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
