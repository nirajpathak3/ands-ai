name: ci

on:
  push:
    branches: [master]
  pull_request:

jobs:
  agent-runtime:
    name: agent-runtime (lint + tests + eval gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install agent-runtime (dev extra)
        working-directory: ai-secops-copilot/services/agent-runtime
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: ai-secops-copilot/services/agent-runtime
        run: ruff check .

      - name: Unit + integration tests (pytest)
        working-directory: ai-secops-copilot/services/agent-runtime
        run: pytest -q

      - name: Evaluation harness self-tests
        working-directory: ai-secops-copilot
        run: python -m pytest evals -q

      - name: Evaluation regression gate (runtime + RAG + judge)
        working-directory: ai-secops-copilot
        run: python evals/run_eval.py --predictor runtime --all --gate --no-write
